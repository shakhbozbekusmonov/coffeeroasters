<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" >
    <meta http-equiv="X-UA-Compatible" content="IE=edge" >
    <meta name="viewport" content="width=device-width, initial-scale=1.0" >
    <title>Coffeeroasters</title>
    <link rel="stylesheet" href="./css/normalize.css" >
    <link rel="stylesheet" href="./css/main.css" >
  </head>
  <body>
    <!-- Header start -->
    <header class="site-header">
      <div class="container">
        <div class="site-header__wrapper">
          <!-- Site Header Logo -->
          <a class="site-header__logo" href="./index.html">
            <img
              class="site-header__logo-img"
              src="./images/logo.svg"
              alt="Cofferoasters"
              width="236"
              height="26"
            >
          </a>

          <!-- Site Header Nav -->
          <nav class="site-header__nav">
            <ul class="site-header__nav-list">
              <li class="site-header__nav-item">
                <a class="site-header__nav-link" href="#">HOME</a>
              </li>
              <li class="site-header__nav-item">
                <a class="site-header__nav-link" href="#">ABOUT US</a>
              </li>
              <li class="site-header__nav-item">
                <a class="site-header__nav-link" href="#">CREATE YOUR PLAN</a>
              </li>
            </ul>
          </nav>
        </div>
      </div>
    </header>
    <!-- Header end -->

    <!-- Main start -->
    <main class="site-main">
      <!-- Hero section start -->
      <section class="hero-section">
        <div class="container">
          <div class="hero-section__wrapper">
            <h1 class="hero-section__title">Great coffee made simple.</h1>

            <p class="hero-section__desc">
              Start your mornings with the world’s best coffees. Try our
              expertly curated artisan coffees from our best roasters delivered
              directly to your door, at your schedule.
            </p>

            <a class="hero-section__btn" href="#" role="button">
                Create your plan
            </a>
          </div>
        </div>
      </section>
      <!-- Hero section end -->
    </main>
    <!-- Main end -->
  </body>
</html>
